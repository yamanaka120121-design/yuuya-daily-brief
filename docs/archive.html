<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過去の記事 — yuuya-daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:'#f0f7ff',100:'#dbeeff',200:'#b6dcfe',300:'#75c0fc',400:'#3aa2f8',500:'#1183e9',600:'#0566c7',700:'#0552a1'}},fontFamily:{sans:['"Noto Sans JP"','sans-serif']}}}}</script>
<style>
  body{background:#f1f5f9}
  .card{background:white;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
</style>
</head>
<body class="font-sans min-h-screen pb-28" style="background:#f1f5f9">

  <!-- ヘッダー -->
  <div class="px-5 pt-5 pb-0">
    <div class="flex justify-between items-center mb-1">
      <h1 class="text-lg font-bold text-slate-800">過去の記事</h1>
      <a href="index.html"
         class="w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center no-underline">
        <svg class="w-4 h-4 text-slate-500" fill="currentColor" viewBox="0 0 24 24">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
      </a>
    </div>
    <p class="text-sm text-slate-400 mb-4">過去90日分の記事を見返せます</p>
  </div>

  <!-- ローディング -->
  <div id="loading" class="px-5 py-10 text-center">
    <p class="text-sm text-slate-400">読み込み中…</p>
  </div>

  <!-- アーカイブ一覧 -->
  <div id="archiveList" class="px-5 space-y-3 hidden"></div>

  <!-- 空の状態 -->
  <div id="emptyState" class="hidden px-5 py-16 text-center">
    <div class="text-5xl mb-4">📂</div>
    <p class="text-sm font-semibold text-slate-500">まだアーカイブがありません</p>
    <p class="text-xs text-slate-400 mt-1">次回の配信後に記録されます</p>
  </div>

  <!-- ボトムナビ -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around px-2 py-2 pb-4 z-10">
    <a href="index.html" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-slate-400 no-underline">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="text-xs">ホーム</span>
    </a>
    <a href="morning.html" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-slate-400 no-underline">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>
      </svg>
      <span class="text-xs">朝</span>
    </a>
    <a href="noon.html" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-slate-400 no-underline">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span class="text-xs">昼</span>
    </a>
    <a href="memo.html" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-slate-400 no-underline">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
      <span class="text-xs">メモ</span>
    </a>
  </nav>

  <script>
    /* 日付 */
    (function(){
      const d = new Date();
      const days = ['日','月','火','水','木','金','土'];
      document.getElementById('dateLabel').textContent =
        `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
    })();

    /* アーカイブ読み込み */
    fetch('./archive.json?t=' + Date.now())
      .then(r => r.ok ? r.json() : [])
      .then(archive => {
        document.getElementById('loading').classList.add('hidden');
        if (!archive || archive.length === 0) {
          document.getElementById('emptyState').classList.remove('hidden');
          return;
        }

        const list = document.getElementById('archiveList');
        list.classList.remove('hidden');

        // 月ごとにグループ化
        const byMonth = {};
        archive.forEach(entry => {
          const month = entry.date.slice(0, 7); // "2026-05"
          if (!byMonth[month]) byMonth[month] = [];
          byMonth[month].push(entry);
        });

        Object.keys(byMonth).sort().reverse().forEach(month => {
          const [y, m] = month.split('-');
          // 月見出し
          const heading = document.createElement('p');
          heading.className = 'text-xs font-bold text-slate-400 uppercase tracking-widest mt-4 mb-2';
          heading.textContent = `${y}年${parseInt(m)}月`;
          list.appendChild(heading);

          byMonth[month].forEach(entry => {
            const card = document.createElement('div');
            card.className = 'card p-4';

            const dateEl = document.createElement('p');
            dateEl.className = 'text-sm font-bold text-slate-700 mb-3';
            dateEl.textContent = entry.label || entry.date;
            card.appendChild(dateEl);

            const links = document.createElement('div');
            links.className = 'flex gap-2 flex-wrap';

            if (entry.morning) {
              const a = document.createElement('a');
              a.href = entry.morning;
              a.className = 'flex items-center gap-1.5 text-xs font-semibold px-3 py-2 rounded-xl bg-emerald-50 text-emerald-700 no-underline';
              a.innerHTML = '🌅 朝の記事';
              links.appendChild(a);
            }
            if (entry.noon) {
              const a = document.createElement('a');
              a.href = entry.noon;
              a.className = 'flex items-center gap-1.5 text-xs font-semibold px-3 py-2 rounded-xl bg-sky-50 text-sky-700 no-underline';
              a.innerHTML = '☀️ 昼の記事';
              links.appendChild(a);
            }
            if (!entry.morning && !entry.noon) {
              const span = document.createElement('span');
              span.className = 'text-xs text-slate-400';
              span.textContent = 'まだ配信なし';
              links.appendChild(span);
            }

            card.appendChild(links);
            list.appendChild(card);
          });
        });
      })
      .catch(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
      });
  </script>

</body>
</html>
