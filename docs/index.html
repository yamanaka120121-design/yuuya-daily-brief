<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yuuya-daily-brief</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                 "Noto Sans JP", sans-serif;
    background: #f4f5f7;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .container { max-width: 480px; width: 100%; }
  h1 { font-size: 1.3em; font-weight: 700; margin-bottom: 6px; }
  p  { font-size: 0.85em; color: #666; margin-bottom: 24px; line-height: 1.6; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a.card {
    display: block;
    background: white;
    border-radius: 12px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
  }
  a.card:hover { opacity: 0.85; }
  .card-label { font-size: 0.7em; font-weight: 700; letter-spacing: 0.06em; }
  .card-title { font-size: 1em; font-weight: 600; margin-top: 4px; }
  .morning .card-label { color: #2d6a4f; }
  .noon    .card-label { color: #1a4a8a; }
</style>
</head>
<body>
<div class="container">
  <h1>yuuya-daily-brief</h1>
  <p>山中優弥 専用の自動配信記事です。<br>LINEのリンクからアクセスしてください。</p>
  <div class="links">
    <a class="card morning" href="morning.html">
      <div class="card-label">MORNING · 6:30</div>
      <div class="card-title">朝の記事</div>
    </a>
    <a class="card noon" href="noon.html">
      <div class="card-label">NOON · 12:00</div>
      <div class="card-title">昼の記事</div>
    </a>
  </div>
</div>
</body>
</html>
