<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メモ — yuuya-daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{brand:{50:'#f0f7ff',100:'#dbeeff',200:'#b6dcfe',300:'#75c0fc',400:'#3aa2f8',500:'#1183e9',600:'#0566c7',700:'#0552a1'}},fontFamily:{sans:['"Noto Sans JP"','sans-serif']}}}}</script>
<style>
  body{background:#f1f5f9}
  .card{background:white;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  textarea{resize:none;outline:none}
  textarea:focus{box-shadow:0 0 0 2px #1183e9}
  .tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;display:inline-block}

  /* 履歴ドロワー */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
  .drawer-overlay.open{opacity:1;pointer-events:auto}
  .drawer-sheet{background:white;border-radius:24px 24px 0 0;width:100%;max-width:600px;margin:0 auto;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
  .drawer-overlay.open .drawer-sheet{transform:translateY(0)}

  /* FAB */
  .fab-history{width:56px;height:56px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.15);border:none;cursor:pointer;position:fixed;bottom:88px;right:20px;z-index:20}

  /* タブ */
  .tab-btn.active{background:#1183e9;color:white}
  .tab-btn:not(.active){background:#f1f5f9;color:#64748b}

  /* AI分類バッジアニメ */
  @keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .ai-badge{animation:fadein .2s ease}
</style>
</head>
<body class="font-sans min-h-screen" style="background:#f1f5f9">

  <!-- ヘッダー -->
  <div class="bg-white px-5 pt-5 pb-4 flex justify-between items-center shadow-sm">
    <div>
      <h1 class="text-base font-bold text-slate-800">メモ</h1>
      <p class="text-xs text-slate-400" id="dateLabel">読み込み中…</p>
    </div>
    <a href="index.html"
       class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center no-underline">
      <svg class="w-4 h-4 text-slate-500" fill="currentColor" viewBox="0 0 24 24">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
      </svg>
    </a>
  </div>

  <!-- 書き込みエリア -->
  <div class="px-5 pt-5 pb-32">
    <div class="card p-4">

      <!-- AI分類バッジ -->
      <div class="flex items-center gap-2 mb-3 min-h-[24px]" id="aiBadgeWrap">
        <span class="text-xs text-slate-400">AIが自動でカテゴリを判定します</span>
      </div>

      <!-- テキストエリア -->
      <textarea id="memoInput" rows="8" maxlength="200"
        placeholder="思ったことをそのまま書いてください。
AI がカテゴリを自動で判定します。

例）
・3年B組の田中くん、今日の古典の授業で初めて手を挙げた
・合奏でトロンボーンのバランスが整ってきた
・読書感想文の採点、この子の感性は本物だ"
        class="w-full border border-slate-200 rounded-xl p-3 text-sm text-slate-700 leading-relaxed"
      ></textarea>

      <!-- 文字数 & 保存 -->
      <div class="flex justify-between items-center mt-3">
        <span id="charCount" class="text-xs text-slate-400">0 / 200</span>
        <button id="saveBtn" type="button"
                class="px-6 py-2.5 rounded-xl bg-brand-500 text-white text-sm font-bold
                       disabled:opacity-40 disabled:cursor-not-allowed"
                disabled>
          保存する
        </button>
      </div>

    </div>

    <!-- 保存完了トースト -->
    <div id="toast"
         class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-50
                bg-slate-800 text-white text-xs font-semibold px-5 py-2.5 rounded-full shadow-lg">
    </div>
  </div>

  <!-- ボトムナビ -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around px-2 py-2 pb-4 z-10">
    <a href="index.html" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-slate-400 no-underline">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="text-xs">ホーム</span>
    </a>
    <a href="morning.html" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-slate-400 no-underline">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>
      </svg>
      <span class="text-xs">朝</span>
    </a>
    <a href="noon.html" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-slate-400 no-underline">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <span class="text-xs">昼</span>
    </a>
    <button type="button" class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center text-brand-500">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
      <span class="text-xs font-semibold">メモ</span>
    </button>
  </nav>

  <!-- 履歴FAB（右下） -->
  <button class="fab-history" id="historyBtn" aria-label="過去のメモを見る" title="記録を見る">
    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
    </svg>
  </button>

  <!-- 履歴ドロワー -->
  <div class="drawer-overlay" id="drawerOverlay">
    <div class="drawer-sheet" id="drawerSheet">
      <!-- ハンドル -->
      <div class="pt-3 pb-1 flex justify-center flex-shrink-0">
        <div class="w-10 h-1 bg-slate-200 rounded-full"></div>
      </div>

      <!-- ドロワーヘッダー -->
      <div class="px-5 py-3 flex justify-between items-center flex-shrink-0">
        <h2 class="text-base font-bold text-slate-800">過去のメモ <span id="memoCountBadge" class="text-sm font-normal text-slate-400"></span></h2>
        <div class="flex gap-2">
          <button id="exportBtn" type="button" title="全件をクリップボードにコピー"
                  class="flex items-center gap-1 text-xs font-semibold text-slate-500 px-3 py-1.5 bg-slate-100 rounded-full">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            一括コピー
          </button>
          <button id="closeDrawer" type="button"
                  class="w-8 h-8 flex items-center justify-center text-slate-400 bg-slate-100 rounded-full text-sm font-bold">
            ✕
          </button>
        </div>
      </div>

      <!-- フィルタータブ -->
      <div class="px-5 pb-3 flex gap-2 overflow-x-auto flex-shrink-0">
        <button type="button" data-cat="すべて" class="tab-btn active flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full">すべて</button>
        <button type="button" data-cat="授業のメモ" class="tab-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full">授業</button>
        <button type="button" data-cat="部活" class="tab-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full">部活</button>
        <button type="button" data-cat="今日の良かったこと" class="tab-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full">良かったこと</button>
        <button type="button" data-cat="発見・アイデア" class="tab-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full">アイデア</button>
        <button type="button" data-cat="教育・学校" class="tab-btn flex-shrink-0 text-xs font-semibold px-3 py-1.5 rounded-full">教育</button>
      </div>

      <!-- メモ一覧（スクロール） -->
      <div class="flex-1 overflow-y-auto px-5 pb-6 space-y-3" id="historyList">
        <!-- JS描画 -->
      </div>

      <!-- 空の状態 -->
      <div id="historyEmpty" class="hidden flex-1 flex flex-col items-center justify-center pb-12 text-center">
        <div class="text-4xl mb-3">📝</div>
        <p class="text-sm font-semibold text-slate-500">まだメモがありません</p>
        <p class="text-xs text-slate-400 mt-1">上の入力欄から記録を始めましょう</p>
      </div>

    </div>
  </div>

  <script>
  /* ─── 定数 ─── */
  const STORAGE_KEY = 'yuuya_memos_v2';
  const CAT_META = {
    '授業のメモ':        { tag: 'bg-violet-100 text-violet-700', border: 'border-l-4 border-violet-400' },
    '部活':              { tag: 'bg-rose-100   text-rose-700',   border: 'border-l-4 border-rose-400'   },
    '今日の良かったこと': { tag: 'bg-green-100  text-green-700',  border: 'border-l-4 border-green-400'  },
    '発見・アイデア':    { tag: 'bg-amber-100  text-amber-700',  border: 'border-l-4 border-amber-400'  },
    '教育・学校':        { tag: 'bg-sky-100    text-sky-700',    border: 'border-l-4 border-sky-400'    },
  };
  const DEFAULT_CAT = '授業のメモ';

  /* ─── データ ─── */
  function loadMemos() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }
  function saveMemos(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

  /* ─── AI 自動分類（キーワードスコアリング） ─── */
  const RULES = [
    { cat: '授業のメモ',
      words: ['授業','国語','古典','現代文','漢字','読む','書く','生徒','板書','評価','テスト','単元','教材','指導案','学習','ホームルーム','HR','クラス','教科','読解','文法','古文','漢文','文学','詩','俳句','短歌','作文','発表','授業中','朝礼'] },
    { cat: '部活',
      words: ['部活','吹奏楽','演奏','練習','コンクール','楽器','指揮','合奏','金管','木管','打楽器','音楽','楽譜','音','アンサンブル','定期演奏会','マーチング','部員','合宿','バンド'] },
    { cat: '今日の良かったこと',
      words: ['嬉しい','よかった','良かった','感動','ありがとう','笑','楽しかった','幸せ','うれしい','救われた','感謝','ほっこり','癒され','温かかった','心に刺さった','涙'] },
    { cat: '発見・アイデア',
      words: ['アイデア','発見','気づき','思いついた','試したい','かも','工夫','試み','面白い','おもしろい','可能性','どうだろう','仮説','実験','挑戦','改善','新しい'] },
    { cat: '教育・学校',
      words: ['学校','教育','先生','保護者','委員会','図書','文部','学力','校務','会議','研修','進路','入試','奈良','職員'] },
  ];

  function autoClassify(text) {
    if (!text.trim()) return DEFAULT_CAT;
    const scores = {};
    RULES.forEach(r => {
      scores[r.cat] = r.words.filter(w => text.includes(w)).length;
    });
    const max = Math.max(...Object.values(scores));
    if (max === 0) return DEFAULT_CAT;
    return Object.keys(scores).find(k => scores[k] === max) || DEFAULT_CAT;
  }

  /* ─── UI更新 ─── */
  let currentCat = 'すべて';
  let detectedCat = DEFAULT_CAT;

  function updateBadge(text) {
    const cat = autoClassify(text);
    detectedCat = cat;
    const meta = CAT_META[cat] || {};
    const wrap = document.getElementById('aiBadgeWrap');
    wrap.innerHTML = text.trim()
      ? `<span class="text-xs text-slate-400">AIが判定：</span>
         <span class="tag ai-badge ${meta.tag || 'bg-slate-100 text-slate-500'}">${cat}</span>`
      : `<span class="text-xs text-slate-400">AIが自動でカテゴリを判定します</span>`;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function relTime(ts) {
    const m = Math.floor((Date.now() - ts) / 60000);
    if (m < 1) return 'たった今';
    if (m < 60) return `${m}分前`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}時間前`;
    const d = Math.floor(h / 24);
    if (d < 7) return `${d}日前`;
    return new Date(ts).toLocaleDateString('ja-JP', {month:'numeric', day:'numeric'});
  }

  function renderHistory(cat) {
    currentCat = cat;
    const all   = loadMemos().slice().reverse();
    const items = cat === 'すべて' ? all : all.filter(m => m.category === cat);
    const list  = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');
    const countEl = document.getElementById('memoCountBadge');

    countEl.textContent = `（${loadMemos().length}件）`;

    if (items.length === 0) {
      list.classList.add('hidden');
      empty.classList.remove('hidden');
      return;
    }
    list.classList.remove('hidden');
    empty.classList.add('hidden');

    list.innerHTML = items.map(m => {
      const meta = CAT_META[m.category] || { tag:'bg-slate-100 text-slate-500', border:'' };
      return `
        <div class="card p-4 ${meta.border}">
          <div class="flex justify-between items-start mb-2">
            <span class="tag ${meta.tag}">${m.category}</span>
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-400">${relTime(m.ts)}</span>
              <button type="button" onclick="deleteMemo('${m.id}')"
                      class="text-slate-300 hover:text-red-400 text-xs" aria-label="削除">✕</button>
            </div>
          </div>
          <p class="text-sm text-slate-700 leading-relaxed">${escHtml(m.content)}</p>
        </div>`;
    }).join('');
  }

  function deleteMemo(id) {
    saveMemos(loadMemos().filter(m => m.id !== id));
    renderHistory(currentCat);
  }

  /* ─── トースト ─── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 2200);
  }

  /* ─── 保存 ─── */
  document.getElementById('saveBtn').addEventListener('click', () => {
    const content = document.getElementById('memoInput').value.trim();
    if (!content) return;
    const memos = loadMemos();
    memos.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      category: detectedCat,
      content,
      ts: Date.now(),
    });
    saveMemos(memos);
    document.getElementById('memoInput').value = '';
    document.getElementById('charCount').textContent = '0 / 200';
    document.getElementById('saveBtn').disabled = true;
    updateBadge('');
    showToast(`✓ 「${detectedCat}」として保存しました`);
  });

  /* ─── 入力ハンドラ ─── */
  document.getElementById('memoInput').addEventListener('input', function() {
    const len = this.value.length;
    document.getElementById('charCount').textContent = `${len} / 200`;
    document.getElementById('saveBtn').disabled = len === 0;
    updateBadge(this.value);
  });

  /* ─── 履歴ドロワー ─── */
  function openDrawer() {
    renderHistory(currentCat);
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('historyBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
  document.getElementById('drawerOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('drawerOverlay')) closeDrawer();
  });

  /* ─── タブ ─── */
  document.querySelectorAll('.drawer-sheet .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.drawer-sheet .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderHistory(btn.dataset.cat);
    });
  });

  /* ─── 一括コピー ─── */
  document.getElementById('exportBtn').addEventListener('click', () => {
    const memos = loadMemos();
    if (!memos.length) { showToast('メモがまだありません'); return; }
    const header = '日時\tカテゴリ\t内容';
    const rows = memos.map(m => {
      const d = new Date(m.ts).toLocaleString('ja-JP');
      return `${d}\t${m.category}\t${m.content}`;
    });
    const tsv = [header, ...rows].join('\n');
    navigator.clipboard.writeText(tsv)
      .then(() => showToast('📋 クリップボードにコピーしました'))
      .catch(() => {
        const ta = document.createElement('textarea');
        ta.value = tsv;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('📋 クリップボードにコピーしました');
      });
  });

  /* ─── 初期化 ─── */
  (function init() {
    const d    = new Date();
    const days = ['日','月','火','水','木','金','土'];
    document.getElementById('dateLabel').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
  })();
  </script>

</body>
</html>
